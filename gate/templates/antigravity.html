<!DOCTYPE html>
<html>
<head>
<title>Antigravity AI Console</title>
<style>
body{background:#0f172a;color:white;font-family:monospace}
.console{background:black;padding:20px;height:300px;overflow:auto}
button{padding:10px;margin:10px}
</style>
</head>
<body>

<h2>🚀 Antigravity AI Backend</h2>
<button onclick="trigger()">Trigger Analysis</button>

<div class="console" id="log"></div>

<script>
function trigger(){
    log("SCAN command issued");
    fetch("/agent/process/",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({command:"SCAN"})
    })
    .then(r=>r.json())
    .then(d=>{
        log("Decision: " + d.status);
        log("Message: " + d.en);
    });
}

function log(msg){
    const div = document.getElementById("log");
    div.innerHTML += "> " + msg + "<br>";
    div.scrollTop = div.scrollHeight;
}
</script>

</body>
</html>
