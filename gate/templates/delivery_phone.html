<h3>Enter Mobile Number</h3>

<select id="code">
  <option value="+91">+91 (India)</option>
  <option value="+1">+1 (USA)</option>
</select>

<input id="phone" placeholder="10-digit mobile" maxlength="10">
<button onclick="sendOtp()">Send OTP</button>

<script>
function sendOtp(){
  const phone = document.getElementById("code").value +
                document.getElementById("phone").value;

  fetch("/delivery/send-otp/",{
    method:"POST",
    headers:{ "Content-Type":"application/x-www-form-urlencoded" },
    body:`phone=${phone}`
  })
  .then(r=>r.json())
  .then(()=> window.location.href="/delivery/otp/");
}
</script>
