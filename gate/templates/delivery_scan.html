<h2>Scan Package</h2>
<video id="cam" autoplay></video>

<p id="result">Detecting...</p>

<button onclick="markDelivered()">Mark Delivered</button>
<button onclick="markFailed()">Not Delivered</button>

<script>
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
  document.getElementById("cam").srcObject = stream;
});

function markDelivered(){
  document.getElementById("result").innerText="✅ DELIVERED";
}

function markFailed(){
  document.getElementById("result").innerText="❌ NOT DELIVERED";
}
</script>
