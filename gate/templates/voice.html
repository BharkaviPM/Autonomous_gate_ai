<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stitch Translator</title>

<style>
/* (UNCHANGED UI STYLES – SAME AS YOUR CODE) */
body, html {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background-color: #000; color: #FF4500;
    font-family: sans-serif; display: flex; flex-direction: column; align-items: center;
}
#lang-bar {
    display: flex; width: 100%; justify-content: space-around;
    padding: 20px 0; background: #111; border-bottom: 2px solid #FF4500;
}
.lang-btn {
    background: #FF4500; color: #000; border: none;
    padding: 15px 20px; font-size: 1.2rem; font-weight: 900; border-radius: 8px;
}
.active-lang { background: #FFF; outline: 4px solid #FF4500; }
#display-box {
    width: 90%; margin-top: 30px; text-align: center;
    min-height: 150px; display: flex; flex-direction: column; justify-content: center;
}
#original-speech { color: #FFF; font-size: 1.5rem; font-style: italic; margin-bottom: 10px; }
#translated-speech { color: #FF4500; font-size: 2.5rem; font-weight: bold; }
#mic-btn {
    margin-top: 20px; width: 250px; height: 250px;
    border-radius: 50%; background-color: #FF4500;
    border: 15px solid #FFF; display: flex; justify-content: center; align-items: center;
}
.icon { font-size: 100px; color: #000; }
#camera-container {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 100;
}
video { width: 100%; height: 100%; object-fit: cover; }
.close-btn {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: #FF4500; color: #000; padding: 20px 40px; font-weight: bold;
}
</style>
</head>

<body>

<div id="lang-bar">
    <button class="lang-btn" onclick="setLang('hi-IN', this)">HINDI</button>
    <button class="lang-btn" onclick="setLang('te-IN', this)">TELUGU</button>
    <button class="lang-btn active-lang" onclick="setLang('en-US', this)">ENGLISH</button>
</div>

<div id="display-box">
    <div id="original-speech">Waiting...</div>
    <div id="translated-speech">TAP TO SPEAK</div>
</div>

<div id="mic-btn" onclick="startListening()">
    <span class="icon">🎙</span>
</div>

<div id="camera-container">
    <video id="webcam" autoplay playsinline></video>
    <div class="close-btn" onclick="stopCamera()">CLOSE</div>
</div>

<script>
let currentLang = 'en-US';
const originalText = document.getElementById('original-speech');
const translatedText = document.getElementById('translated-speech');
const cameraContainer = document.getElementById('camera-container');
const video = document.getElementById('webcam');

function setLang(code, btn){
    currentLang = code;
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active-lang'));
    btn.classList.add('active-lang');
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

function startListening(){
    recognition.lang = currentLang;
    recognition.start();
    translatedText.innerText = "LISTENING...";
}

recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript.toLowerCase();
    originalText.innerText = `You said: "${transcript}"`;

    if (transcript.includes("scan") || transcript.includes("स्कैन") || transcript.includes("స్కాన్")) {
        sendToAgent("SCAN");
    } 
    else if (transcript.includes("help") || transcript.includes("मदद") || transcript.includes("సహాయం")) {
        sendToAgent("HELP");
    } 
    else {
        translatedText.innerText = "NOT RECOGNIZED";
    }
};

/* 🔗 DJANGO INTEGRATION */
function sendToAgent(command){
    fetch("/agent/process/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ command })
    })
    .then(r => r.json())
    .then(d => {
        translatedText.innerText = d.en;
        speak(d);

        if (d.status === "OPEN") openCamera();
    });
}

function speak(d){
    const msg = new SpeechSynthesisUtterance(
        currentLang === "hi-IN" ? d.hi :
        currentLang === "te-IN" ? d.te : d.en
    );
    msg.lang = currentLang;
    speechSynthesis.speak(msg);
}

async function openCamera(){
    const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:"environment" }});
    video.srcObject = stream;
    cameraContainer.style.display = "block";
}

function stopCamera(){
    const stream = video.srcObject;
    if(stream) stream.getTracks().forEach(t=>t.stop());
    cameraContainer.style.display="none";
    translatedText.innerText="TAP TO SPEAK";
}
</script>

</body>
</html>
